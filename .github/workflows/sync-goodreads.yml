name: Sync Goodreads Books

on:
  schedule:
    # Runs weekly on Sundays at midnight UTC
    - cron: '0 0 * * 0'
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write

jobs:
  sync-books:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.20'

      - name: Run book sync script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python3 scripts/fetch_goodreads_books.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/book/ static/images/books/
          
          # Check if there are any changes staged
          if git diff --cached --quiet; then
            echo "No new books or covers to commit."
          else
            git commit -m "chore: auto-sync read books from Goodreads"
            git push origin main
          fi
